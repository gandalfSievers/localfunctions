# ElasticMQ configuration for Traefik integration tests.
# Returns queue URLs with the Traefik-proxied amazonaws.com domain so that
# subsequent SQS operations route through Traefik transparently.

node-address {
  protocol = https
  host = "sqs.us-east-1.amazonaws.com"
  port = 443
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = relaxed
}

queues {
  "traefik-test-queue" {
    defaultVisibilityTimeout = 5 seconds
    delay = 0 seconds
    receiveMessageWait = 0 seconds
  }
}
