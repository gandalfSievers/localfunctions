# AWS-style virtual host routing test infrastructure.
#
# Extends docker-compose.test.yml with a dnsmasq container that resolves
# *.amazonaws.com to the localfunctions container. The test-runner executes
# inside the Docker network so DNS resolution works transparently.
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.test.awsstyle.yml up -d
#   docker compose -f docker-compose.test.yml -f docker-compose.test.awsstyle.yml \
#     run --rm test-runner
#   docker compose -f docker-compose.test.yml -f docker-compose.test.awsstyle.yml down
#
# Pre-pull required images:
#   docker pull public.ecr.aws/lambda/python:3.12
#   docker pull public.ecr.aws/lambda/nodejs:20

services:
  dns-awsstyle:
    image: alpine
    container_name: localfunctions-dns-awsstyle
    networks:
      testnet:
        ipv4_address: 172.31.0.54
    volumes:
      - ./docker/dnsmasq-awsstyle.conf:/etc/dnsmasq.conf
    cap_add:
      - NET_ADMIN
    command: sh -c "apk add --no-cache dnsmasq && dnsmasq -k"

  test-runner:
    image: rust:1.94
    container_name: localfunctions-awstest-runner
    networks:
      testnet:
    dns:
      - 172.31.0.54
    volumes:
      - .:/workspace
      - lf-cargo-registry:/usr/local/cargo/registry
      - lf-cargo-target:/workspace/target
    working_dir: /workspace
    environment:
      - TEST_ENDPOINT_URL=http://localfunctions-test:9600
      - TEST_AWSSTYLE_ENDPOINT_URL=http://lambda.us-east-1.amazonaws.com:9600
    depends_on:
      localfunctions:
        condition: service_healthy
      dns-awsstyle:
        condition: service_started
    command: cargo test --test docker_awsstyle_integration -- --ignored --test-threads=1

volumes:
  lf-cargo-registry:
  lf-cargo-target:
